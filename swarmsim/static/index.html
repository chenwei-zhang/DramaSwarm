<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DramaSwarm - GraphRAG 知识图谱可视化</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: #0f1923;
  color: #e0e0e0;
  overflow: hidden;
  height: 100vh;
}

/* ── Header ── */
#header {
  height: 52px;
  background: linear-gradient(135deg, #1a2332, #0f1923);
  border-bottom: 1px solid #2a3a4a;
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 16px;
  z-index: 100;
}
#header h1 {
  font-size: 16px;
  color: #4FC3F7;
  white-space: nowrap;
}
#header h1 span { color: #FF7043; }

.header-group {
  display: flex;
  align-items: center;
  gap: 8px;
}

.header-group label {
  font-size: 12px;
  color: #8899aa;
}

.header-group select, .header-group input {
  background: #1a2a3a;
  color: #e0e0e0;
  border: 1px solid #2a3a4a;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 13px;
  outline: none;
}
.header-group select:focus, .header-group input:focus {
  border-color: #4FC3F7;
}

#search-input {
  width: 120px;
}

.btn {
  background: #1a3a5a;
  color: #4FC3F7;
  border: 1px solid #2a4a6a;
  padding: 4px 12px;
  border-radius: 4px;
  font-size: 12px;
  cursor: pointer;
  transition: all 0.2s;
}
.btn:hover { background: #2a4a6a; }
.btn.active { background: #4FC3F7; color: #0f1923; border-color: #4FC3F7; }
.btn.danger { color: #FF7043; border-color: #FF7043; }
.btn.danger:hover { background: #FF7043; color: #0f1923; }

/* ── Tab 切换 ── */
.tab-bar {
  display: flex;
  gap: 0;
  margin-left: auto;
}
.tab-btn {
  background: transparent;
  color: #8899aa;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 6px 16px;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.2s;
}
.tab-btn:hover { color: #e0e0e0; }
.tab-btn.active {
  color: #4FC3F7;
  border-bottom-color: #4FC3F7;
}

/* ── Crisis Layout ── */
#crisis-view {
  display: none;
  height: calc(100vh - 52px);
  overflow-y: auto;
  padding: 16px;
}

.crisis-grid {
  display: grid;
  grid-template-columns: 260px 1fr 320px;
  gap: 12px;
  height: calc(100vh - 88px);
}

.crisis-panel {
  background: #141e2a;
  border: 1px solid #2a3a4a;
  border-radius: 8px;
  overflow-y: auto;
  padding: 12px;
}
.crisis-panel::-webkit-scrollbar { width: 4px; }
.crisis-panel::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

.crisis-panel h4 {
  font-size: 12px;
  color: #8899aa;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #1a2a3a;
}

.crisis-select {
  width: 100%;
  background: #1a2a3a;
  color: #e0e0e0;
  border: 1px solid #2a3a4a;
  padding: 6px 8px;
  border-radius: 4px;
  font-size: 13px;
  margin-bottom: 8px;
}

.crisis-person-card {
  background: #1a2a3a;
  border-radius: 6px;
  padding: 8px 10px;
  margin-bottom: 6px;
}
.crisis-person-card .name { font-size: 13px; font-weight: bold; }
.crisis-person-card .score { font-size: 20px; font-weight: bold; color: #4FC3F7; }
.crisis-person-card .label { font-size: 10px; color: #667788; }

.crisis-bar {
  height: 4px;
  border-radius: 2px;
  background: #2a3a4a;
  margin-top: 4px;
}
.crisis-bar-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.3s;
}

.crisis-timeline {
  list-style: none;
  padding-left: 16px;
  border-left: 2px solid #2a3a4a;
}
.crisis-timeline li {
  position: relative;
  padding: 6px 0 6px 12px;
  font-size: 12px;
  color: #aabbcc;
}
.crisis-timeline li::before {
  content: '';
  position: absolute;
  left: -6px;
  top: 10px;
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: #2a4a6a;
  border: 2px solid #4FC3F7;
}

.crisis-actions-bar {
  display: flex;
  gap: 8px;
  margin: 12px 0;
  flex-wrap: wrap;
  align-items: center;
}

.crisis-intervention {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 8px;
}
.crisis-intervention select, .crisis-intervention input {
  background: #1a2a3a;
  color: #e0e0e0;
  border: 1px solid #2a3a4a;
  padding: 4px 8px;
  border-radius: 4px;
  font-size: 12px;
}

#crisis-chart {
  width: 100%;
  height: 240px;
  background: #0f1923;
  border-radius: 6px;
}

.trending-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 4px 0;
  font-size: 12px;
  border-bottom: 1px solid #1a2a3a;
}
.trending-rank {
  color: #FF7043;
  font-weight: bold;
  width: 24px;
}
.trending-heat {
  color: #FF7043;
  font-size: 11px;
}

.media-item {
  padding: 6px 0;
  border-bottom: 1px solid #1a2a3a;
  font-size: 12px;
}
.media-outlet {
  color: #4FC3F7;
  font-size: 10px;
}

.brand-item {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 11px;
}
.brand-action-continue { color: #4CAF50; }
.brand-action-monitoring { color: #FFC107; }
.brand-action-suspended { color: #FF9800; }
.brand-action-terminated { color: #F44336; }

.audience-item {
  padding: 3px 0;
  border-bottom: 1px solid #1a2a3a;
  font-size: 11px;
}
.audience-sentiment-pos { color: #4CAF50; }
.audience-sentiment-neg { color: #F44336; }
.audience-sentiment-neu { color: #888; }
.interaction-arrow { color: #FFC107; font-size: 10px; margin-right: 4px; }

.outcome-box {
  background: #1a2a3a;
  border-radius: 8px;
  padding: 12px;
  margin-top: 8px;
}
.outcome-verdict {
  font-size: 16px;
  font-weight: bold;
  margin-bottom: 8px;
}
.outcome-metric {
  display: flex;
  justify-content: space-between;
  padding: 3px 0;
  font-size: 12px;
  border-bottom: 1px solid #2a3a4a;
}

.phase-badge {
  display: inline-block;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  font-weight: bold;
}
.phase-breakout { background: #F44336; color: white; }
.phase-escalation { background: #FF9800; color: white; }
.phase-peak { background: #E91E63; color: white; }
.phase-mitigation { background: #2196F3; color: white; }
.phase-resolution { background: #4CAF50; color: white; }
.phase-aftermath { background: #607D8B; color: white; }

/* ── Main Layout ── */
#main {
  display: grid;
  grid-template-columns: 280px 1fr 340px;
  height: calc(100vh - 52px);
}

/* ── Left Sidebar ── */
#left-sidebar {
  background: #141e2a;
  border-right: 1px solid #2a3a4a;
  overflow-y: auto;
  padding: 12px;
}
#left-sidebar::-webkit-scrollbar { width: 4px; }
#left-sidebar::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

.sidebar-section {
  margin-bottom: 16px;
}
.sidebar-section h3 {
  font-size: 12px;
  color: #8899aa;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 8px;
  padding-bottom: 4px;
  border-bottom: 1px solid #1a2a3a;
}

.stat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 6px;
}
.stat-card {
  background: #1a2a3a;
  padding: 8px;
  border-radius: 6px;
  text-align: center;
}
.stat-card .value {
  font-size: 18px;
  font-weight: bold;
  color: #4FC3F7;
}
.stat-card .label {
  font-size: 10px;
  color: #667788;
  margin-top: 2px;
}

.agent-card {
  background: #1a2a3a;
  padding: 8px 10px;
  border-radius: 6px;
  margin-bottom: 6px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.agent-card:hover { background: #2a3a4a; }
.agent-card.selected { background: #1a3a5a; border: 1px solid #4FC3F7; }
.agent-card .emoji { font-size: 16px; }
.agent-card .info { flex: 1; }
.agent-card .name { font-size: 13px; font-weight: 500; }
.agent-card .role { font-size: 10px; color: #667788; }
.agent-card .bars { display: flex; gap: 4px; align-items: center; }
.mini-bar {
  width: 30px; height: 4px;
  background: #2a3a4a;
  border-radius: 2px;
  overflow: hidden;
}
.mini-bar .fill { height: 100%; border-radius: 2px; }
.mini-bar.stress .fill { background: #FF7043; }
.mini-bar.energy .fill { background: #66BB6A; }

.reaction-layer {
  background: #1a2a3a;
  border-radius: 6px;
  margin-bottom: 6px;
  overflow: hidden;
}
.reaction-header {
  padding: 8px 10px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 12px;
  font-weight: 500;
}
.reaction-header:hover { background: #2a3a4a; }
.reaction-header .icon { margin-right: 6px; }
.reaction-body {
  padding: 6px 10px 10px;
  font-size: 11px;
  line-height: 1.6;
  display: none;
}
.reaction-body.open { display: block; }

.hot-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
}
.hot-item .rank { color: #FF7043; font-weight: bold; width: 20px; }
.hot-item .rank.up { color: #66BB6A; }
.hot-item .rank.down { color: #FF7043; }
.hot-item .heat { color: #667788; margin-left: auto; font-size: 10px; }

/* ── Canvas ── */
#canvas-container {
  position: relative;
  overflow: hidden;
  background:
    radial-gradient(circle, #1a2a3a 1px, transparent 1px);
  background-size: 24px 24px;
}

#canvas-container svg {
  width: 100%;
  height: 100%;
}

/* ── Right Sidebar ── */
#right-sidebar {
  background: #141e2a;
  border-left: 1px solid #2a3a4a;
  overflow-y: auto;
  padding: 16px;
}
#right-sidebar::-webkit-scrollbar { width: 4px; }
#right-sidebar::-webkit-scrollbar-thumb { background: #2a3a4a; border-radius: 2px; }

.detail-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 16px;
}
.detail-avatar {
  width: 48px;
  height: 48px;
  border-radius: 50%;
  background: #1a3a5a;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
}
.detail-name {
  font-size: 18px;
  font-weight: 600;
}
.detail-subtitle {
  font-size: 12px;
  color: #667788;
}

.detail-section {
  margin-bottom: 16px;
}
.detail-section h4 {
  font-size: 12px;
  color: #8899aa;
  margin-bottom: 8px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.detail-tag {
  display: inline-block;
  background: #1a3a5a;
  color: #4FC3F7;
  padding: 2px 8px;
  border-radius: 3px;
  font-size: 11px;
  margin: 2px;
}

.rel-item {
  background: #1a2a3a;
  padding: 8px;
  border-radius: 4px;
  margin-bottom: 4px;
  display: flex;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: background 0.2s;
}
.rel-item:hover { background: #2a3a4a; }
.rel-type {
  font-size: 11px;
  padding: 2px 6px;
  border-radius: 3px;
  color: #fff;
  white-space: nowrap;
}
.rel-name { font-size: 13px; flex: 1; }
.rel-bars { display: flex; gap: 4px; }
.rel-bar {
  width: 40px; height: 3px;
  background: #2a3a4a;
  border-radius: 1px;
  overflow: hidden;
}
.rel-bar .fill { height: 100%; border-radius: 1px; }

.event-item {
  background: #1a2a3a;
  padding: 8px;
  border-radius: 4px;
  margin-bottom: 4px;
}
.event-item .title { font-size: 13px; margin-bottom: 2px; }
.event-item .meta { font-size: 10px; color: #667788; }

.path-step {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 0;
}
.path-step .arrow { color: #4FC3F7; font-size: 16px; }
.path-step .node-label {
  background: #1a3a5a;
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
}
.path-step .edge-label {
  color: #FF7043;
  font-size: 11px;
}

/* ── Legend ── */
#legend {
  position: absolute;
  bottom: 12px;
  left: 12px;
  background: rgba(20, 30, 42, 0.92);
  border-radius: 6px;
  padding: 10px 14px;
  font-size: 11px;
  z-index: 10;
  backdrop-filter: blur(8px);
}
#legend .item {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 3px;
}
#legend .dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
}
#legend .diamond {
  width: 10px;
  height: 10px;
  background: #FF7043;
  transform: rotate(45deg);
}

/* ── Simulation Controls ── */
.sim-controls {
  display: flex;
  gap: 6px;
  margin-bottom: 12px;
}

#inject-form {
  margin-top: 8px;
}
#inject-form textarea {
  width: 100%;
  background: #1a2a3a;
  color: #e0e0e0;
  border: 1px solid #2a3a4a;
  border-radius: 4px;
  padding: 6px 8px;
  font-size: 12px;
  resize: vertical;
  min-height: 40px;
  outline: none;
}
#inject-form textarea:focus { border-color: #4FC3F7; }

/* ── Empty state ── */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: #667788;
}
.empty-state .icon { font-size: 32px; margin-bottom: 8px; }
.empty-state p { font-size: 13px; }

/* ── Tooltip ── */
#tooltip {
  position: absolute;
  background: rgba(20, 30, 42, 0.95);
  border: 1px solid #2a3a4a;
  border-radius: 4px;
  padding: 6px 10px;
  font-size: 11px;
  pointer-events: none;
  z-index: 200;
  display: none;
  max-width: 200px;
  backdrop-filter: blur(8px);
}

/* ── Search dropdown ── */
#search-dropdown {
  position: absolute;
  top: 52px;
  left: 0;
  right: 0;
  background: #141e2a;
  border: 1px solid #2a3a4a;
  border-top: none;
  max-height: 200px;
  overflow-y: auto;
  z-index: 150;
  display: none;
}
.search-item {
  padding: 8px 16px;
  cursor: pointer;
  font-size: 13px;
}
.search-item:hover { background: #1a3a5a; }
</style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1><span>DramaSwarm</span> GraphRAG</h1>

  <div class="header-group">
    <label>过滤:</label>
    <select id="filter-select">
      <option value="celebrity">名人关系</option>
      <option value="all">全部节点</option>
    </select>
  </div>

  <div class="header-group">
    <label>路径:</label>
    <select id="path-from"><option value="">起点</option></select>
    <span style="color:#667788">→</span>
    <select id="path-to"><option value="">终点</option></select>
    <button class="btn" id="path-btn">查找</button>
  </div>

  <div class="header-group" style="margin-left:auto;">
    <input type="text" id="search-input" placeholder="搜索名人...">
  </div>

  <button class="btn" id="refresh-btn">刷新</button>

  <div class="tab-bar">
    <button class="tab-btn active" data-tab="graph">知识图谱</button>
    <button class="tab-btn" data-tab="crisis">危机模拟</button>
  </div>
</div>

<!-- Main -->
<div id="main">
  <!-- Left Sidebar -->
  <div id="left-sidebar">
    <div class="sidebar-section">
      <h3>图谱统计</h3>
      <div class="stat-grid" id="stats-grid"></div>
    </div>

    <div class="sidebar-section">
      <h3>仿真控制</h3>
      <div class="sim-controls">
        <button class="btn" id="sim-start-btn">启动仿真</button>
        <button class="btn" id="sim-pause-btn">暂停</button>
        <button class="btn danger" id="sim-stop-btn">停止</button>
      </div>
      <div id="inject-form">
        <textarea id="inject-text" placeholder="注入事件内容..."></textarea>
        <button class="btn" id="inject-btn" style="margin-top:4px;width:100%">注入事件</button>
      </div>
    </div>

    <div class="sidebar-section">
      <h3>Agent 状态</h3>
      <div id="agent-list"></div>
    </div>

    <div class="sidebar-section">
      <h3>社会反应</h3>
      <div id="reaction-layers"></div>
    </div>
  </div>

  <!-- Canvas -->
  <div id="canvas-container">
    <svg></svg>
    <div id="tooltip"></div>
    <div id="legend"></div>
  </div>

  <!-- Right Sidebar -->
  <div id="right-sidebar">
    <div id="detail-content">
      <div class="empty-state">
        <div class="icon">👆</div>
        <p>点击图谱中的节点查看详情</p>
        <p style="margin-top:8px;font-size:11px;color:#556677">拖拽移动 · 滚轮缩放 · 点击选择</p>
      </div>
    </div>
  </div>
</div>

<!-- Crisis Simulation View -->
<div id="crisis-view">
  <div class="crisis-grid">
    <!-- Left Panel: Scenario + Persons + Intervention -->
    <div class="crisis-panel" id="crisis-left">
      <h4>场景选择</h4>
      <select class="crisis-select" id="crisis-scenario-select">
        <option value="">加载中...</option>
      </select>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <button class="btn" id="crisis-start-btn" style="flex:1">启动仿真</button>
        <button class="btn" id="crisis-reset-btn">重置</button>
      </div>

      <div style="display:flex;gap:4px;margin-bottom:8px;">
        <button class="btn" id="crisis-toggle-custom" style="flex:1;font-size:11px;">自定义场景</button>
      </div>

      <!-- 自定义场景面板 -->
      <div id="crisis-custom-panel" style="display:none;">
        <div style="margin-bottom:6px;">
          <input id="cc-title" placeholder="场景标题" style="width:100%;background:#1a2a3a;color:#e0e0e0;border:1px solid #2a3a4a;padding:4px 8px;border-radius:4px;font-size:12px;">
        </div>
        <div style="margin-bottom:6px;">
          <input id="cc-desc" placeholder="场景描述（可选）" style="width:100%;background:#1a2a3a;color:#e0e0e0;border:1px solid #2a3a4a;padding:4px 8px;border-radius:4px;font-size:12px;">
        </div>
        <div style="margin-bottom:6px;">
          <select id="cc-type" style="width:100%;background:#1a2a3a;color:#e0e0e0;border:1px solid #2a3a4a;padding:4px 8px;border-radius:4px;font-size:12px;">
            <option value="other">其他</option><option value="cheating">出轨</option>
            <option value="scandal">丑闻</option><option value="divorce">离婚</option>
            <option value="drugs">吸毒</option><option value="tax_evasion">偷税漏税</option>
          </select>
        </div>
        <div style="margin-bottom:6px;">
          <label style="font-size:10px;color:#667788;">严重度: <span id="cc-severity-val">0.5</span></label>
          <input id="cc-severity" type="range" min="0.1" max="1.0" step="0.1" value="0.5" style="width:100%;">
        </div>
        <h4 style="margin-top:8px;">选择人物（最多6人）</h4>
        <div id="cc-person-grid" style="max-height:180px;overflow-y:auto;margin-bottom:6px;"></div>
        <div id="cc-relationships" style="font-size:11px;color:#8899aa;margin-bottom:6px;"></div>
        <button class="btn" id="cc-discover" style="width:100%;margin-bottom:4px;">发现关系</button>
        <button class="btn active" id="cc-create" style="width:100%;">创建并启动</button>
      </div>

      <h4>人物状态</h4>
      <div id="crisis-persons"></div>

      <h4>干预面板</h4>
      <div class="crisis-intervention">
        <select id="crisis-iv-trigger" style="flex:1">

<script>
// ── Constants ──
const NODE_COLORS = {
  celebrity: '#4FC3F7',
  gossip: '#FF7043',
  news: '#66BB6A',
};
const RELATION_COLORS = {
  '配偶': '#E91E63', '前夫': '#9C27B0', '前妻': '#9C27B0',
  '前任': '#9C27B0', '前配偶': '#9C27B0',
  '绯闻': '#FF4081', '绯闻对象': '#FF4081', '传闻': '#FF4081',
  '搭档': '#2196F3', '合作': '#42A5F5', '合作伙伴': '#42A5F5',
  '好友': '#4CAF50', '闺蜜': '#4CAF50', '朋友': '#4CAF50',
  '对手': '#F44336', '竞争对手': '#EF5350', '宿敌': '#F44336',
  '同代竞争': '#EF5350',
  '亲属': '#FF9800', '家人': '#FF9800',
  '同事': '#78909C', '前同事': '#607D8B', '同学': '#78909C',
  'rumored': '#FF4081', 'partner': '#42A5F5', 'former': '#9C27B0',
  'colleague': '#78909C', 'friend': '#4CAF50', 'rival': '#F44336',
};
const SENTIMENT_ICONS = { positive: '🟢', negative: '🔴', neutral: '⚪', mixed: '🟡' };

// ── State ──
let simulation = null;
let graphData = { nodes: [], edges: [] };
let selectedNode = null;
let celebrities = [];
let pathHighlight = null;

// ── Init ──
document.addEventListener('DOMContentLoaded', () => {
  loadStats();
  loadGraph();
  setupEventListeners();
});

// ── API ──
async function api(url) {
  const res = await fetch(url);
  return res.json();
}

async function apiPost(url, body) {
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  return res.json();
}

// ── Stats ──
async function loadStats() {
  const stats = await api('/api/graph/stats');
  const grid = document.getElementById('stats-grid');
  grid.innerHTML = `
    <div class="stat-card"><div class="value">${stats.total_nodes || 0}</div><div class="label">节点</div></div>
    <div class="stat-card"><div class="value">${stats.total_edges || 0}</div><div class="label">边</div></div>
    <div class="stat-card"><div class="value">${(stats.node_types||{}).celebrity || 0}</div><div class="label">名人</div></div>
    <div class="stat-card"><div class="value">${(stats.node_types||{}).gossip || 0}</div><div class="label">事件</div></div>
  `;

  celebrities = stats.celebrities || [];
  populateSelects();
}

function populateSelects() {
  const fromSel = document.getElementById('path-from');
  const toSel = document.getElementById('path-to');
  [fromSel, toSel].forEach(sel => {
    sel.innerHTML = '<option value="">选择</option>';
    celebrities.forEach(name => {
      sel.innerHTML += `<option value="${name}">${name}</option>`;
    });
  });
}

// ── Graph ──
async function loadGraph(filter) {
  filter = filter || document.getElementById('filter-select').value;
  graphData = await api(`/api/graph/data?filter=${filter}`);
  renderGraph(graphData);
  updateLegend();
}

function renderGraph(data) {
  const container = document.getElementById('canvas-container');
  const svg = d3.select('#canvas-container svg');
  svg.selectAll('*').remove();

  const width = container.clientWidth;
  const height = container.clientHeight;

  svg.attr('width', width).attr('height', height);

  // Zoom
  const g = svg.append('g');
  svg.call(d3.zoom()
    .scaleExtent([0.1, 4])
    .on('zoom', (event) => g.attr('transform', event.transform)));

  // Prepare nodes with initial positions
  const nodes = data.nodes.map(d => ({ ...d, x: width/2 + (Math.random()-0.5)*100, y: height/2 + (Math.random()-0.5)*100 }));
  const edges = data.edges.map(d => ({ ...d }));

  // Force simulation
  if (simulation) simulation.stop();
  simulation = d3.forceSimulation(nodes)
    .force('link', d3.forceLink(edges).id(d => d.id)
      .distance(d => {
        if (d.edge_type === 'relationship') return 120 - (d.strength || 0.5) * 40;
        if (d.edge_type === 'involved_in') return 80;
        return 100;
      })
      .strength(d => {
        if (d.edge_type === 'relationship') return 0.3 + (d.strength || 0.5) * 0.5;
        return 0.15;
      }))
    .force('charge', d3.forceManyBody().strength(-350).distanceMax(600))
    .force('center', d3.forceCenter(width / 2, height / 2))
    .force('collide', d3.forceCollide().radius(d => (d.radius || 20) + 8).strength(0.8))
    .force('x', d3.forceX(width / 2).strength(0.04))
    .force('y', d3.forceY(height / 2).strength(0.04))
    .alphaDecay(0.02);

  // Edges
  // Group multi-edges between same pair
  const edgeGroup = {};
  edges.forEach(e => {
    const key = [e.source.id || e.source, e.target.id || e.target].sort().join('||');
    if (!edgeGroup[key]) edgeGroup[key] = [];
    edgeGroup[key].push(e);
  });
  // Assign curve offsets
  Object.values(edgeGroup).forEach(group => {
    const count = group.length;
    if (count === 1) { group[0].curve_offset = 0; return; }
    group.forEach((e, i) => {
      const offset = (i - (count - 1) / 2) * 0.15;
      e.curve_offset = offset;
    });
  });

  const linkGroup = g.append('g').attr('class', 'links');
  const linkElements = linkGroup.selectAll('path')
    .data(edges)
    .join('path')
    .attr('fill', 'none')
    .attr('stroke', d => getEdgeColor(d))
    .attr('stroke-width', d => d.edge_type === 'relationship' ? 1.5 + (d.strength || 0.5) * 1.5 : 1)
    .attr('stroke-dasharray', d => d.edge_type === 'involved_in' ? '4,4' : d.edge_type === 'simulation_event' ? '6,3' : null)
    .attr('opacity', 0.6);

  // Edge labels
  const labelGroup = g.append('g').attr('class', 'edge-labels');
  const edgeLabels = labelGroup.selectAll('g')
    .data(edges.filter(d => d.edge_type === 'relationship' && d.relation_type))
    .join('g');

  edgeLabels.append('rect')
    .attr('fill', 'rgba(15,25,35,0.85)')
    .attr('rx', 2);

  edgeLabels.append('text')
    .text(d => d.relation_type || '')
    .attr('fill', d => getEdgeColor(d))
    .attr('font-size', '9px')
    .attr('text-anchor', 'middle')
    .attr('dy', '0.3em');

  // Nodes
  const nodeGroup = g.append('g').attr('class', 'nodes');

  // Gossip nodes: diamond shape
  const gossipNodes = nodes.filter(d => d.type === 'gossip');
  const gossipGroup = nodeGroup.selectAll('g.gossip')
    .data(gossipNodes)
    .join('g')
    .attr('class', 'gossip');

  gossipGroup.append('rect')
    .attr('width', d => (d.radius || 12) * 1.6)
    .attr('height', d => (d.radius || 12) * 1.6)
    .attr('x', d => -(d.radius || 12) * 0.8)
    .attr('y', d => -(d.radius || 12) * 0.8)
    .attr('fill', d => NODE_COLORS[d.type] || '#888')
    .attr('stroke', '#0f1923')
    .attr('stroke-width', 2)
    .attr('rx', 2)
    .attr('transform', 'rotate(45)');

  // Celebrity + news nodes: circles
  const circleNodes = nodes.filter(d => d.type !== 'gossip');
  const circleGroup = nodeGroup.selectAll('g.circle')
    .data(circleNodes)
    .join('g')
    .attr('class', 'circle');

  circleGroup.append('circle')
    .attr('r', d => d.radius || 20)
    .attr('fill', d => NODE_COLORS[d.type] || '#888')
    .attr('stroke', '#0f1923')
    .attr('stroke-width', 2)
    .attr('opacity', 0.9);

  // Node labels
  const allNodeGroups = nodeGroup.selectAll('g');

  allNodeGroups.append('text')
    .text(d => d.name || (d.title || '').substring(0, 8))
    .attr('text-anchor', 'middle')
    .attr('dy', d => (d.radius || 20) + 14)
    .attr('fill', '#c0c8d0')
    .attr('font-size', '11px')
    .attr('font-weight', d => d.type === 'celebrity' ? '600' : '400')
    .attr('pointer-events', 'none');

  // Drag behavior
  const drag = d3.drag()
    .on('start', (event, d) => {
      d._dragStartX = event.x;
      d._dragStartY = event.y;
      d._isDragging = false;
    })
    .on('drag', (event, d) => {
      const dx = event.x - d._dragStartX;
      const dy = event.y - d._dragStartY;
      if (Math.sqrt(dx*dx + dy*dy) > 3) d._isDragging = true;
      if (!d._isDragging) return;
      d.fx = event.x;
      d.fy = event.y;
      simulation.alphaTarget(0.3).restart();
    })
    .on('end', (event, d) => {
      if (!d._isDragging) return;
      d.fx = null;
      d.fy = null;
      simulation.alphaTarget(0);
    });

  allNodeGroups.call(drag);

  // Click
  allNodeGroups.on('click', (event, d) => {
    if (d._isDragging) return;
    event.stopPropagation();
    selectNode(d);
  });

  // Hover tooltip
  allNodeGroups.on('mouseenter', (event, d) => {
    const tooltip = document.getElementById('tooltip');
    let html = '';
    if (d.type === 'celebrity') {
      html = `<strong>${d.name}</strong>`;
      if (d.occupation && d.occupation.length) html += `<br><span style="color:#8899aa">${d.occupation.join(' ')}</span>`;
    } else {
      html = `<strong>${(d.title || '').substring(0, 30)}</strong>`;
      if (d.importance) html += `<br><span style="color:#8899aa">重要度: ${d.importance.toFixed(1)}</span>`;
      if (d.date) html += `<br><span style="color:#8899aa">${d.date}</span>`;
      if (d.gossip_type) html += `<br><span style="color:#FF7043">${d.gossip_type}</span>`;
    }
    tooltip.innerHTML = html;
    tooltip.style.display = 'block';
    tooltip.style.left = (event.pageX + 12) + 'px';
    tooltip.style.top = (event.pageY - 10) + 'px';
  }).on('mouseleave', () => {
    document.getElementById('tooltip').style.display = 'none';
  });

  // Background click to deselect
  svg.on('click', () => {
    deselectNode();
  });

  // Tick
  simulation.on('tick', () => {
    linkElements.attr('d', d => {
      const sx = d.source.x, sy = d.source.y;
      const tx = d.target.x, ty = d.target.y;
      const dx = tx - sx, dy = ty - sy;
      const dr = Math.sqrt(dx*dx + dy*dy) * (d.curve_offset || 0);
      if (!dr) return `M${sx},${sy}L${tx},${ty}`;
      return `M${sx},${sy}A${dr},${dr} 0 0,1 ${tx},${ty}`;
    });

    edgeLabels.each(function(d) {
      const el = d3.select(this);
      const sx = d.source.x, sy = d.source.y;
      const tx = d.target.x, ty = d.target.y;
      const dx = tx - sx, dy = ty - sy;
      const dr = Math.sqrt(dx*dx + dy*dy) * (d.curve_offset || 0);
      let mx, my;
      if (!dr) { mx = (sx+tx)/2; my = (sy+ty)/2; }
      else {
        // Quadratic bezier midpoint
        const cx = sx + (dx/2) + dr * (-dy / Math.sqrt(dx*dx+dy*dy+1));
        const cy = sy + (dy/2) + dr * (dx / Math.sqrt(dx*dx+dy*dy+1));
        mx = 0.25*sx + 0.5*cx + 0.25*tx;
        my = 0.25*sy + 0.5*cy + 0.25*ty;
      }
      el.select('text').attr('x', mx).attr('y', my);
      const bbox = el.select('text').node().getBBox();
      el.select('rect').attr('x', bbox.x - 3).attr('y', bbox.y - 1).attr('width', bbox.width + 6).attr('height', bbox.height + 2);
    });

    gossipGroup.attr('transform', d => `translate(${d.x},${d.y})`);
    circleGroup.attr('transform', d => `translate(${d.x},${d.y})`);
  });

  // Restore selection if node still exists
  if (selectedNode) {
    const found = nodes.find(n => n.id === selectedNode.id);
    if (found) selectNode(found);
    else deselectNode();
  }
}

function getEdgeColor(d) {
  if (d.edge_type === 'involved_in') return '#556677';
  if (d.edge_type === 'simulation_event') return '#FF5252';
  return RELATION_COLORS[d.relation_type] || '#4a6a8a';
}

function selectNode(d) {
  selectedNode = d;

  // Visual highlight
  const allG = d3.selectAll('.nodes g');
  const connectedIds = new Set([d.id]);

  graphData.edges.forEach(e => {
    const sid = e.source.id || e.source;
    const tid = e.target.id || e.target;
    if (sid === d.id) connectedIds.add(tid);
    if (tid === d.id) connectedIds.add(sid);
  });

  allG.transition().duration(200)
    .attr('opacity', n => connectedIds.has(n.id) ? 1 : 0.15);

  d3.selectAll('.links path').transition().duration(200)
    .attr('opacity', e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      return (sid === d.id || tid === d.id) ? 0.9 : 0.05;
    });

  d3.selectAll('.edge-labels g').transition().duration(200)
    .attr('opacity', e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      return (sid === d.id || tid === d.id) ? 1 : 0.1;
    });

  // Highlight selected node stroke
  allG.select('circle, rect').attr('stroke', n => n.id === d.id ? '#fff' : '#0f1923')
    .attr('stroke-width', n => n.id === d.id ? 3 : 2);

  // Load detail
  loadDetail(d);
}

function deselectNode() {
  selectedNode = null;
  d3.selectAll('.nodes g').transition().duration(200).attr('opacity', 1);
  d3.selectAll('.links path').transition().duration(200).attr('opacity', 0.6);
  d3.selectAll('.edge-labels g').transition().duration(200).attr('opacity', 1);
  d3.selectAll('.nodes g').select('circle, rect').attr('stroke', '#0f1923').attr('stroke-width', 2);
  document.getElementById('detail-content').innerHTML = `
    <div class="empty-state">
      <div class="icon">👆</div>
      <p>点击图谱中的节点查看详情</p>
    </div>`;
}

async function loadDetail(d) {
  const panel = document.getElementById('detail-content');

  if (d.type === 'celebrity') {
    const data = await api(`/api/graph/person/${encodeURIComponent(d.name)}`);
    if (data.error) { panel.innerHTML = `<p>${data.error}</p>`; return; }

    let html = `
      <div class="detail-header">
        <div class="detail-avatar">👤</div>
        <div>
          <div class="detail-name">${data.name}</div>
          <div class="detail-subtitle">${(data.occupation || []).join(' · ')}</div>
        </div>
      </div>`;

    if (data.company) html += `<div style="margin-bottom:8px;font-size:12px;color:#8899aa">公司: ${data.company}</div>`;
    if (data.weibo_followers) {
      const f = data.weibo_followers;
      const text = f >= 1e8 ? (f/1e8).toFixed(1) + '亿' : f >= 1e4 ? (f/1e4).toFixed(0) + '万' : f;
      html += `<div style="margin-bottom:12px;font-size:12px;color:#8899aa">微博粉丝: ${text}</div>`;
    }
    if (data.famous_works && data.famous_works.length) {
      html += `<div class="detail-section"><h4>代表作品</h4><div>${data.famous_works.slice(0,8).map(w => `<span class="detail-tag">${w}</span>`).join('')}</div></div>`;
    }

    // Relationships
    if (data.relationships && data.relationships.length) {
      html += `<div class="detail-section"><h4>关系 (${data.relationships.length})</h4>`;
      data.relationships.forEach(r => {
        const color = RELATION_COLORS[r.relation_type] || '#4a6a8a';
        const strPct = Math.round((r.strength || 0.5) * 100);
        const confPct = Math.round((r.confidence || 0.5) * 100);
        html += `
          <div class="rel-item" onclick="navigateToNode('${r.name}')">
            <span class="rel-type" style="background:${color}">${r.relation_type}</span>
            <span class="rel-name">${r.name}</span>
            <div class="rel-bars">
              <div class="rel-bar"><div class="fill" style="width:${strPct}%;background:${color}"></div></div>
              <div class="rel-bar"><div class="fill" style="width:${confPct}%;background:#4FC3F7"></div></div>
            </div>
          </div>`;
      });
      html += '</div>';
    }

    // Events
    if (data.events && data.events.length) {
      html += `<div class="detail-section"><h4>关联事件 (${data.events.length})</h4>`;
      data.events.slice(0, 8).forEach(e => {
        const icon = SENTIMENT_ICONS[e.sentiment] || '⚪';
        html += `
          <div class="event-item">
            <div class="title">${icon} ${e.title}</div>
            <div class="meta">${e.type}${e.date ? ' · ' + e.date : ''}${typeof e.importance === 'number' ? ' · 重要度 ' + e.importance.toFixed(1) : ''}</div>
          </div>`;
      });
      html += '</div>';
    }

    // Graph context
    if (data.graph_context) {
      html += `<div class="detail-section"><h4>Agent 上下文</h4><div style="font-size:11px;line-height:1.6;color:#8899aa;background:#1a2a3a;padding:8px;border-radius:4px;white-space:pre-wrap">${data.graph_context}</div></div>`;
    }

    panel.innerHTML = html;

  } else {
    // Gossip/News node
    const icon = d.type === 'gossip' ? '🔥' : '📰';
    let html = `
      <div class="detail-header">
        <div class="detail-avatar">${icon}</div>
        <div>
          <div class="detail-name" style="font-size:14px">${d.title || '未知事件'}</div>
          <div class="detail-subtitle">${d.type === 'gossip' ? '八卦事件' : '新闻'}</div>
        </div>
      </div>`;

    if (d.gossip_type) html += `<div class="detail-tag" style="margin-bottom:8px">${d.gossip_type}</div>`;
    if (d.date) html += `<div style="font-size:12px;color:#4FC3F7;margin-bottom:4px">${d.date}</div>`;
    if (d.importance !== undefined) html += `<div style="font-size:12px;color:#8899aa;margin-bottom:8px">重要度: ${d.importance.toFixed(1)}</div>`;

    // Find connected celebrities
    const connected = [];
    graphData.edges.forEach(e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      if (tid === d.id && e.edge_type === 'involved_in') {
        const node = graphData.nodes.find(n => n.id === sid);
        if (node) connected.push({ name: node.name, role: e.role });
      }
      if (sid === d.id && e.edge_type === 'involved_in') {
        const node = graphData.nodes.find(n => n.id === tid);
        if (node) connected.push({ name: node.name, role: e.role });
      }
    });
    if (connected.length) {
      html += `<div class="detail-section"><h4>涉及人物</h4>`;
      connected.forEach(c => {
        html += `<div class="rel-item" onclick="navigateToNode('${c.name}')">
          <span class="rel-type" style="background:#556677">${c.role || '关联'}</span>
          <span class="rel-name">${c.name}</span>
        </div>`;
      });
      html += '</div>';
    }

    panel.innerHTML = html;
  }
}

function navigateToNode(name) {
  // Find the node in current graph data
  const nodeId = `celebrity:${name}`;
  const node = graphData.nodes.find(n => n.id === nodeId);
  if (node && simulation) {
    selectNode(node);
    // Zoom to it
    const svg = d3.select('#canvas-container svg');
    const g = svg.select('g');
    const container = document.getElementById('canvas-container');
    const width = container.clientWidth;
    const height = container.clientHeight;
    const scale = 1.5;
    const transform = d3.zoomIdentity
      .translate(width / 2 - node.x * scale, height / 2 - node.y * scale)
      .scale(scale);
    svg.transition().duration(500).call(d3.zoom().on('zoom', (e) => g.attr('transform', e.transform)).transform, transform);
  } else {
    // Not in current view, switch to person's neighborhood
    loadPersonGraph(name);
  }
}

async function loadPersonGraph(name) {
  graphData = await api(`/api/graph/data?filter=celebrity&name=${encodeURIComponent(name)}&depth=2`);
  renderGraph(graphData);
  updateLegend();
  // Select the person
  const nodeId = `celebrity:${name}`;
  const node = graphData.nodes.find(n => n.id === nodeId);
  if (node) setTimeout(() => selectNode(node), 300);
}

// ── Path Finding ──
async function findPath() {
  const from = document.getElementById('path-from').value;
  const to = document.getElementById('path-to').value;
  if (!from || !to) return;

  const result = await api(`/api/graph/path?from=${encodeURIComponent(from)}&to=${encodeURIComponent(to)}`);

  const panel = document.getElementById('detail-content');
  if (!result.nodes || !result.nodes.length) {
    panel.innerHTML = `<div class="empty-state"><div class="icon">❌</div><p>未找到 ${from} → ${to} 的路径</p></div>`;
    return;
  }

  // Highlight path
  pathHighlight = new Set(result.nodes.map(n => n.id));
  const pathEdgeSet = new Set();
  result.edges.forEach(e => {
    pathEdgeSet.add(e.source + '||' + e.target);
    pathEdgeSet.add(e.target + '||' + e.source);
  });

  d3.selectAll('.nodes g').transition().duration(300)
    .attr('opacity', n => pathHighlight.has(n.id) ? 1 : 0.12);

  d3.selectAll('.links path').transition().duration(300)
    .attr('opacity', e => {
      const sid = e.source.id || e.source;
      const tid = e.target.id || e.target;
      return pathEdgeSet.has(sid + '||' + tid) ? 0.9 : 0.03;
    });

  d3.selectAll('.nodes g').select('circle, rect')
    .attr('stroke', n => pathHighlight.has(n.id) ? '#FFD54F' : '#0f1923')
    .attr('stroke-width', n => pathHighlight.has(n.id) ? 3 : 2);

  // Display path
  let html = `
    <div class="detail-header">
      <div class="detail-avatar">🔗</div>
      <div>
        <div class="detail-name" style="font-size:14px">${from} → ${to}</div>
        <div class="detail-subtitle">路径长度: ${result.length} 跳</div>
      </div>
    </div>
    <div class="detail-section"><h4>关系路径</h4>`;

  result.nodes.forEach((node, i) => {
    const typeIcon = node.type === 'celebrity' ? '👤' : node.type === 'gossip' ? '🔥' : '📰';
    const label = node.name || node.title || node.id;
    if (i === 0) {
      html += `<div class="path-step"><span class="node-label">${typeIcon} ${label}</span></div>`;
    } else {
      const edge = result.edges[i - 1];
      const edgeLabel = edge ? (edge.relation_type || edge.role || '') : '';
      html += `<div class="path-step">
        <span class="arrow">→</span>
        ${edgeLabel ? `<span class="edge-label">${edgeLabel}</span>` : ''}
        <span class="node-label">${typeIcon} ${label}</span>
      </div>`;
    }
  });
  html += '</div>';
  panel.innerHTML = html;
}

// ── Legend ──
function updateLegend() {
  const legend = document.getElementById('legend');
  const types = {};
  graphData.nodes.forEach(n => { types[n.type] = (types[n.type] || 0) + 1; });

  let html = '';
  if (types.celebrity) html += `<div class="item"><div class="dot" style="background:${NODE_COLORS.celebrity}"></div>名人 (${types.celebrity})</div>`;
  if (types.gossip) html += `<div class="item"><div class="diamond"></div>八卦 (${types.gossip})</div>`;
  if (types.news) html += `<div class="item"><div class="dot" style="background:${NODE_COLORS.news}"></div>新闻 (${types.news})</div>`;

  // Show top relation types
  const relTypes = {};
  graphData.edges.filter(e => e.edge_type === 'relationship' && e.relation_type).forEach(e => {
    relTypes[e.relation_type] = (relTypes[e.relation_type] || 0) + 1;
  });
  Object.entries(relTypes).slice(0, 5).forEach(([type, count]) => {
    const color = RELATION_COLORS[type] || '#4a6a8a';
    html += `<div class="item"><div style="width:16px;height:2px;background:${color}"></div>${type} (${count})</div>`;
  });

  legend.innerHTML = html;
}

// ── Simulation ──
async function startSim() {
  const names = celebrities.length >= 5 ? celebrities.slice(0, 5) : ['杨幂', '李小璐', '贾乃亮', 'PG One', '唐嫣'];
  const result = await apiPost('/api/sim/start', { names, turns: 15, use_llm: false });
  if (result.status === 'started') {
    document.getElementById('sim-start-btn').classList.add('active');
    pollSimState();
  } else {
    alert('启动失败: ' + (result.message || JSON.stringify(result)));
  }
}

async function pollSimState() {
  const state = await api('/api/sim/state');
  renderSimState(state);
  if (state.loop_stats && state.loop_stats.total_turns < 15) {
    setTimeout(pollSimState, 2000);
  } else {
    document.getElementById('sim-start-btn').classList.remove('active');
  }
}

// ── Event Listeners ──
function setupEventListeners() {
  // Filter change
  document.getElementById('filter-select').addEventListener('change', e => {
    loadGraph(e.target.value);
  });

  // Refresh
  document.getElementById('refresh-btn').addEventListener('click', () => {
    loadStats();
    loadGraph();
  });

  // Path finding
  document.getElementById('path-btn').addEventListener('click', findPath);

  // Search
  const searchInput = document.getElementById('search-input');
  searchInput.addEventListener('input', () => {
    const query = searchInput.value.trim();
    if (!query) return;
    const matches = celebrities.filter(n => n.includes(query));
    if (matches.length === 1) {
      navigateToNode(matches[0]);
      searchInput.value = '';
    }
  });
  searchInput.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const query = searchInput.value.trim();
      const match = celebrities.find(n => n.includes(query));
      if (match) {
        navigateToNode(match);
        searchInput.value = '';
      }
    }
  });

  // Simulation controls
  document.getElementById('sim-start-btn').addEventListener('click', startSim);
  document.getElementById('sim-pause-btn').addEventListener('click', () => apiPost('/api/sim/pause', {}));
  document.getElementById('sim-resume-btn')?.addEventListener('click', () => apiPost('/api/sim/resume', {}));
  document.getElementById('sim-stop-btn').addEventListener('click', () => {
    apiPost('/api/sim/stop', {});
    document.getElementById('sim-start-btn').classList.remove('active');
  });

  // Inject event
  document.getElementById('inject-btn').addEventListener('click', () => {
    const text = document.getElementById('inject-text').value.trim();
    if (!text) return;
    apiPost('/api/sim/inject', { event_type: 'conflict', content: text, severity: 0.7 });
    document.getElementById('inject-text').value = '';
    setTimeout(pollSimState, 500);
  });

  // Resize
  const resizeObserver = new ResizeObserver(() => {
    if (graphData.nodes.length) renderGraph(graphData);
  });
  resizeObserver.observe(document.getElementById('canvas-container'));

  // Tab switching
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const tab = btn.dataset.tab;
      document.getElementById('main').style.display = tab === 'graph' ? 'grid' : 'none';
      document.getElementById('crisis-view').style.display = tab === 'crisis' ? 'block' : 'none';
      if (tab === 'crisis') loadCrisisScenarios();
    });
  });

  // Crisis controls
  document.getElementById('crisis-start-btn').addEventListener('click', startCrisisSim);
  document.getElementById('crisis-step-btn').addEventListener('click', stepCrisisSim);
  document.getElementById('crisis-run-btn').addEventListener('click', runCrisisSim);
  document.getElementById('crisis-reset-btn').addEventListener('click', resetCrisisSim);
  document.getElementById('crisis-outcome-btn').addEventListener('click', loadCrisisOutcome);
  document.getElementById('crisis-iv-add').addEventListener('click', addCrisisIntervention);

  // Custom scenario controls
  document.getElementById('crisis-toggle-custom').addEventListener('click', toggleCustomScenario);
  document.getElementById('cc-severity').addEventListener('input', e => {
    document.getElementById('cc-severity-val').textContent = e.target.value;
  });
  document.getElementById('cc-discover').addEventListener('click', discoverRelationships);
  document.getElementById('cc-create').addEventListener('click', createCustomScenario);
}

const PERSON_COLORS = ['#4FC3F7','#FF7043','#66BB6A','#FFC107','#AB47BC','#EF5350'];
let crisisHistory = [];

async function loadCrisisScenarios() {
  const data = await api('/api/crisis/scenarios');
  const sel = document.getElementById('crisis-scenario-select');
  sel.innerHTML = '<option value="">选择场景...</option>';
  (data.scenarios || []).forEach(s => {
    sel.innerHTML += `<option value="${s.title}">${s.title} (${s.date || '未知日期'}) - ${s.involved_persons.join(', ')}</option>`;
  });
}

async function startCrisisSim() {
  const title = document.getElementById('crisis-scenario-select').value;
  if (!title) return alert('请先选择场景');
  const res = await apiPost('/api/crisis/start', {
    scenario_title: title,
    total_days: 30,
  });
  if (res.error) return alert(res.error);
  crisisHistory = [res.initial_state];
  updateCrisisUI(res.initial_state);
  document.getElementById('crisis-status').textContent = '仿真已启动';
}

async function stepCrisisSim() {
  const res = await apiPost('/api/crisis/step', {});
  if (res.error) return alert(res.error);
  crisisHistory.push(res.state);
  updateCrisisUI(res.state);
  document.getElementById('crisis-status').textContent = `第${res.state.day}天 ${res.state.phase_label}`;
}

async function runCrisisSim() {
  document.getElementById('crisis-status').textContent = '运行中...';
  const res = await apiPost('/api/crisis/run', {});
  if (res.error) return alert(res.error);
  crisisHistory = res.history || [];
  if (crisisHistory.length) updateCrisisUI(crisisHistory[crisisHistory.length - 1]);
  document.getElementById('crisis-status').textContent = res.status === 'completed' ? '仿真完成' : '运行中';
  drawCrisisChart();
}

async function resetCrisisSim() {
  await apiPost('/api/crisis/reset', {});
  crisisHistory = [];
  document.getElementById('crisis-status').textContent = '';
  document.getElementById('crisis-timeline-list').innerHTML = '';
  document.getElementById('crisis-trending').innerHTML = '';
  document.getElementById('crisis-media').innerHTML = '';
  document.getElementById('crisis-brands').innerHTML = '';
  document.getElementById('crisis-outcome').innerHTML = '';
  document.getElementById('crisis-persons').innerHTML = '';
  document.getElementById('crisis-day-label').textContent = '';
  clearCrisisChart();
}

async function loadCrisisOutcome() {
  const res = await api('/api/crisis/outcome');
  if (res.error) return alert(res.error);
  const el = document.getElementById('crisis-outcome');
  let html = `<div class="outcome-box">`;
  html += `<div class="outcome-verdict" style="color:${res.verdict==='better'?'#4CAF50':res.verdict==='worse'?'#F44336':'#FFC107'}">${res.verdict_label}</div>`;
  html += `<p style="font-size:12px;white-space:pre-wrap;margin:8px 0;">${res.summary}</p>`;
  if (res.metrics_comparison) {
    Object.entries(res.metrics_comparison).forEach(([key, val]) => {
      if (key.startsWith('_')) return;
      html += `<div style="margin-bottom:6px;"><b style="color:#4FC3F7;">${key}</b>`;
      if (typeof val === 'object') {
        Object.entries(val).forEach(([k,v]) => {
          if (typeof v === 'number') v = v.toFixed(1);
          html += `<div class="outcome-metric"><span>${k}</span><span>${v}</span></div>`;
        });
      }
      html += `</div>`;
    });
  }
  if (res.pr_recommendations && res.pr_recommendations.length) {
    html += `<h4 style="margin-top:8px;">PR 建议</h4>`;
    res.pr_recommendations.forEach(r => html += `<p style="font-size:11px;color:#aabbcc;margin:2px 0;">- ${r}</p>`);
  }
  html += `</div>`;
  el.innerHTML = html;
}

function updateCrisisUI(state) {
  if (!state) return;

  // Day label
  document.getElementById('crisis-day-label').innerHTML =
    `第${state.day}天 <span class="phase-badge phase-${state.phase}">${state.phase_label}</span>`;

  // Person cards
  const personsEl = document.getElementById('crisis-persons');
  personsEl.innerHTML = '';
  const names = Object.keys(state.approval_scores || {});
  names.forEach((name, i) => {
    const ap = state.approval_scores[name] || 50;
    const bv = (state.brand_values || {})[name] || 50;
    const color = PERSON_COLORS[i % PERSON_COLORS.length];
    // Check if this person was triggered by interaction
    const myInteractions = (state.interaction_log || []).filter(l => l.responder === name);
    let interactionHtml = '';
    if (myInteractions.length) {
      const last = myInteractions[myInteractions.length - 1];
      interactionHtml = `<div style="font-size:10px;color:#FFC107;margin-top:2px;">← 被${last.trigger}的${last.trigger_action}触发</div>`;
    }
    personsEl.innerHTML += `
      <div class="crisis-person-card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="name" style="color:${color}">${name}</span>
          <span class="score">${ap.toFixed(0)}</span>
        </div>
        <div class="crisis-bar"><div class="crisis-bar-fill" style="width:${ap}%;background:${color}"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;">
          <span class="label">品牌: ${bv.toFixed(0)}</span>
          <span class="label">监管: Lv.${state.regulatory_level}</span>
        </div>
        ${interactionHtml}
      </div>`;
  });

  // Update intervention person select
  const ivPersonSel = document.getElementById('crisis-iv-person');
  ivPersonSel.innerHTML = '<option value="">人物</option>';
  names.forEach(n => ivPersonSel.innerHTML += `<option value="${n}">${n}</option>`);

  // Trending
  const trendingEl = document.getElementById('crisis-trending');
  trendingEl.innerHTML = '';
  (state.trending_topics || []).forEach(t => {
    trendingEl.innerHTML += `<div class="trending-item">
      <span><span class="trending-rank">#${t.rank}</span> ${t.title}</span>
      <span class="trending-heat">${(t.heat/1000).toFixed(1)}k</span>
    </div>`;
  });

  // Media
  const mediaEl = document.getElementById('crisis-media');
  mediaEl.innerHTML = '';
  (state.media_headlines || []).slice(0, 6).forEach(h => {
    mediaEl.innerHTML += `<div class="media-item">
      <span class="media-outlet">[${h.outlet}]</span> ${h.headline}
    </div>`;
  });

  // Brands
  const brandsEl = document.getElementById('crisis-brands');
  brandsEl.innerHTML = '';
  Object.entries(state.person_brands || {}).forEach(([person, brands]) => {
    brandsEl.innerHTML += `<div style="font-size:12px;color:#4FC3F7;margin-bottom:2px;">${person}</div>`;
    brands.forEach(b => {
      brandsEl.innerHTML += `<div class="brand-item">
        <span>${b.brand}</span>
        <span class="brand-action-${b.action}">${b.action}</span>
      </div>`;
    });
  });

  // Audience reactions
  const audienceEl = document.getElementById('crisis-audience');
  audienceEl.innerHTML = '';
  const reactions = state.audience_reactions || [];
  if (reactions.length) {
    const posCount = reactions.filter(r => r.sentiment === 'positive').length;
    const negCount = reactions.filter(r => r.sentiment === 'negative').length;
    const neuCount = reactions.filter(r => r.sentiment === 'neutral').length;
    audienceEl.innerHTML += `<div style="font-size:11px;margin-bottom:4px;">
      <span class="audience-sentiment-pos">+${posCount}</span> /
      <span class="audience-sentiment-neg">-${negCount}</span> /
      <span class="audience-sentiment-neu">${neuCount}</span>
    </div>`;
    reactions.slice(0, 5).forEach(r => {
      const cls = r.sentiment === 'positive' ? 'audience-sentiment-pos'
        : r.sentiment === 'negative' ? 'audience-sentiment-neg' : 'audience-sentiment-neu';
      audienceEl.innerHTML += `<div class="audience-item">
        <span class="${cls}">${r.sentiment === 'positive' ? '+' : r.sentiment === 'negative' ? '-' : '='}</span>
        ${(r.content || '').substring(0, 40)}
      </div>`;
    });
  } else {
    audienceEl.innerHTML = '<div style="color:#556677;font-size:11px;">等待仿真运行...</div>';
  }

  // Interaction log display in person cards
  const interactions = state.interaction_log || [];

  // Timeline — 从完整历史累积显示
  const tlEl = document.getElementById('crisis-timeline-list');
  tlEl.innerHTML = '';
  crisisHistory.forEach(s => {
    const dayLabel = `<span style="color:#4FC3F7;font-weight:bold;">Day${s.day}</span> `;
    (s.agent_actions || []).forEach(a => {
      let triggerHtml = '';
      if (a.triggered_by) {
        triggerHtml = ` <span class="interaction-arrow">← ${a.triggered_by}的${a.trigger_action || '动作'}触发</span>`;
      }
      tlEl.innerHTML += `<li>${dayLabel}<b>${a.actor}</b> ${a.action_label} ${a.content ? '- ' + a.content : ''}${triggerHtml}</li>`;
    });
    (s.rumors || []).forEach(r => {
      tlEl.innerHTML += `<li>${dayLabel}<span style="color:#FF7043;">谣言: ${r.content}</span></li>`;
    });
  });

  // Chart
  drawCrisisChart();
}

function clearCrisisChart() {
  const canvas = document.getElementById('crisis-chart');
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

function drawCrisisChart() {
  const canvas = document.getElementById('crisis-chart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width - 24;
  canvas.height = 240;

  const w = canvas.width, h = canvas.height;
  const pad = { top: 20, right: 20, bottom: 30, left: 40 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0f1923';
  ctx.fillRect(0, 0, w, h);

  // Fetch history from API if local is empty
  if (!crisisHistory.length) return;

  const allDays = crisisHistory.map(s => s.day);
  const maxDay = Math.max(...allDays, 1);
  const names = Object.keys(crisisHistory[0].approval_scores || {});

  // Grid
  ctx.strokeStyle = '#1a2a3a';
  ctx.lineWidth = 1;
  for (let i = 0; i <= 4; i++) {
    const y = pad.top + ch * i / 4;
    ctx.beginPath();
    ctx.moveTo(pad.left, y);
    ctx.lineTo(w - pad.right, y);
    ctx.stroke();
    ctx.fillStyle = '#556677';
    ctx.font = '10px sans-serif';
    ctx.fillText((100 - i * 25).toString(), 4, y + 4);
  }

  // X axis labels
  ctx.fillStyle = '#556677';
  for (let d = 0; d <= maxDay; d += Math.max(1, Math.floor(maxDay / 6))) {
    const x = pad.left + (d / maxDay) * cw;
    ctx.fillText('D' + d, x - 8, h - 4);
  }

  // Draw lines per person
  names.forEach((name, idx) => {
    const color = PERSON_COLORS[idx % PERSON_COLORS.length];
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    let started = false;
    crisisHistory.forEach(s => {
      const x = pad.left + (s.day / maxDay) * cw;
      const y = pad.top + (1 - (s.approval_scores[name] || 50) / 100) * ch;
      if (!started) { ctx.moveTo(x, y); started = true; }
      else ctx.lineTo(x, y);
    });
    ctx.stroke();

    // Label
    const lastState = crisisHistory[crisisHistory.length - 1];
    const lx = pad.left + (lastState.day / maxDay) * cw + 4;
    const ly = pad.top + (1 - (lastState.approval_scores[name] || 50) / 100) * ch;
    ctx.fillStyle = color;
    ctx.font = 'bold 10px sans-serif';
    ctx.fillText(name, lx, ly + 3);
  });

  // Heat line
  ctx.strokeStyle = '#FF7043';
  ctx.lineWidth = 1;
  ctx.setLineDash([4, 4]);
  ctx.beginPath();
  crisisHistory.forEach((s, i) => {
    const x = pad.left + (s.day / maxDay) * cw;
    const y = pad.top + (1 - s.heat_index / 100) * ch;
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  });
  ctx.stroke();
  ctx.setLineDash([]);
}

// ── Custom Scenario Functions ──

let customCelebrities = [];
let selectedCustomPersons = new Set();

function toggleCustomScenario() {
  const panel = document.getElementById('crisis-custom-panel');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    loadCelebritiesForCustom();
  } else {
    panel.style.display = 'none';
  }
}

async function loadCelebritiesForCustom() {
  const data = await api('/api/crisis/celebrities');
  customCelebrities = data.celebrities || [];
  const grid = document.getElementById('cc-person-grid');
  grid.innerHTML = '';
  customCelebrities.forEach(c => {
    const fans = c.weibo_followers || 0;
    const fansText = fans >= 1e8 ? (fans/1e8).toFixed(1)+'亿' : fans >= 1e4 ? (fans/1e4).toFixed(0)+'万' : fans;
    const occ = (c.occupation || []).slice(0, 2).join('·');
    const checked = selectedCustomPersons.has(c.name) ? 'checked' : '';
    grid.innerHTML += `
      <div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #1a2a3a;">
        <input type="checkbox" class="cc-person-cb" data-name="${c.name}" ${checked}
          onchange="toggleCustomPerson('${c.name}', this.checked)" style="width:14px;height:14px;">
        <div style="flex:1;">
          <div style="font-size:12px;font-weight:500;">${c.name}</div>
          <div style="font-size:10px;color:#667788;">${occ} · ${fansText}粉丝</div>
        </div>
      </div>`;
  });
}

function toggleCustomPerson(name, checked) {
  if (checked && selectedCustomPersons.size >= 6) {
    alert('最多选择6人');
    // uncheck the last one
    document.querySelectorAll('.cc-person-cb').forEach(cb => {
      if (cb.dataset.name === name) cb.checked = false;
    });
    return;
  }
  if (checked) selectedCustomPersons.add(name);
  else selectedCustomPersons.delete(name);
  document.getElementById('cc-relationships').innerHTML =
    `已选 ${selectedCustomPersons.size} 人: ${[...selectedCustomPersons].join(', ')}`;
}

async function discoverRelationships() {
  if (selectedCustomPersons.size < 2) {
    alert('请至少选择2人'); return;
  }
  const persons = [...selectedCustomPersons].join(',');
  const data = await api(`/api/crisis/relationships?persons=${encodeURIComponent(persons)}`);
  const rels = data.relationships || [];
  const el = document.getElementById('cc-relationships');
  if (!rels.length) {
    el.innerHTML = '<span style="color:#FF7043">未发现已知关系</span>';
    return;
  }
  el.innerHTML = rels.map(r =>
    `<div style="margin:2px 0;"><span style="color:#4FC3F7">${r.person_a}</span>` +
    ` — <span style="color:#FF9800">${r.relation_type}</span> — ` +
    `<span style="color:#4FC3F7">${r.person_b}</span></div>`
  ).join('');
}

async function createCustomScenario() {
  if (selectedCustomPersons.size < 2) {
    alert('请至少选择2人'); return;
  }
  const title = document.getElementById('cc-title').value.trim() || '自定义场景';
  const desc = document.getElementById('cc-desc').value.trim();
  const type = document.getElementById('cc-type').value;
  const severity = parseFloat(document.getElementById('cc-severity').value);

  const res = await apiPost('/api/crisis/custom-scenario', {
    title, description: desc, involved_persons: [...selectedCustomPersons],
    initial_severity: severity, gossip_type: type, interaction_mode: 'crisis',
  });
  if (res.error) return alert(res.error);

  crisisHistory = [res.initial_state];
  updateCrisisUI(res.initial_state);
  document.getElementById('crisis-status').textContent = `自定义场景「${title}」已启动`;

  // 刷新场景下拉
  loadCrisisScenarios();
}

// ── Experiment Functions ──

function addExpGroup(btn) {
  const container = document.getElementById('exp-groups');
  const row = document.createElement('div');
  row.className = 'exp-group-row';
  row.style.cssText = 'display:flex;gap:6px;align-items:center;margin-bottom:4px;';
  row.innerHTML = `
    <input placeholder="组名" style="flex:1;background:#1a2a3a;color:#e0e0e00;border:1px solid #2a3a4a;padding:4px 8px;border-radius:4px;font-size:12px;" class="exp-group-name">
    <button class="btn danger" style="font-size:11px;" onclick="this.parentElement.remove()">x</button>
  `;
  container.appendChild(row);
}

document.getElementById('exp-toggle-btn').addEventListener('click', () => {
  const panel = document.getElementById('experiment-panel');
  panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  if (panel.style.display !== 'none') populateExpScenarios();
});

async function populateExpScenarios() {
  const data = await api('/api/crisis/scenarios');
  const sel = document.getElementById('exp-scenario');
  sel.innerHTML = '<option value="">选择场景...</option>';
  (data.scenarios || []).forEach(s => {
    sel.innerHTML += `<option value="${s.title}">${s.title}</option>`;
  });
}

document.getElementById('exp-create-btn').addEventListener('click', async () => {
  const scenarioTitle = document.getElementById('exp-scenario').value;
  if (!scenarioTitle) return alert('请选择场景');

  const names = [...document.querySelectorAll('.exp-group-name')].map(el => el.value.trim()).filter(Boolean);
  if (names.length < 2) return alert('请至少添加2个实验组');

  const groups = names.map(name => ({ name, interventions: [], description: name }));
  const res = await apiPost('/api/crisis/experiment/create', {
    scenario_title: scenarioTitle,
    groups,
    use_llm: false,
    total_days: 30,
  });
  if (res.error) return alert(res.error);
  alert(`实验已创建！ID: ${res.experiment_id}`);
});

document.getElementById('exp-run-btn').addEventListener('click', async () => {
  const listRes = await api('/api/crisis/experiments');
  const experiments = listRes.experiments || [];
  if (!experiments.length) return alert('请先创建实验');

  const exp = experiments[experiments.length - 1];
  document.getElementById('exp-run-btn').textContent = '运行中...';
  document.getElementById('exp-run-btn').disabled = true;

  try {
    const res = await apiPost(`/api/crisis/experiment/${exp.experiment_id}/run`, {});
    if (res.error) { alert(res.error); return; }

    // 获取对比结果
    const comparison = await api(`/api/crisis/experiment/${exp.experiment_id}/compare`);
    if (!comparison.error) renderExpComparison(comparison);
  } catch (e) {
    alert('运行失败: ' + e.message);
  } finally {
    document.getElementById('exp-run-btn').textContent = '运行';
    document.getElementById('exp-run-btn').disabled = false;
  }
});

function renderExpComparison(data) {
  const resultDiv = document.getElementById('exp-result');
  resultDiv.style.display = 'block';

  // Draw chart
  const canvas = document.getElementById('exp-chart');
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width - 24;
  canvas.height = 200;
  const w = canvas.width, h = canvas.height;
  const pad = { top: 20, right: 20, bottom: 30, left: 50 };
  const cw = w - pad.left - pad.right;
  const ch = h - pad.top - pad.bottom;

  ctx.clearRect(0, 0, w, h);
  ctx.fillStyle = '#0f1923';
  ctx.fillRect(0, 0, w, h);

  const colors = ['#4FC3F7', '#FF7043', '#66BB6A', '#FFC107', '#AB47BC', '#EF5350'];
  const summaries = data.groups_summary || [];

  // Bar chart: avg_approval per group
  if (summaries.length) {
    const maxVal = Math.max(...summaries.map(s => s.avg_approval || 50), 100);
    const barWidth = Math.min(40, cw / summaries.length - 10);

    summaries.forEach((s, i) => {
      const val = s.avg_approval || 0;
      const barH = (val / maxVal) * ch;
      const x = pad.left + (i + 0.5) * (cw / summaries.length) - barWidth / 2;
      const y = pad.top + ch - barH;

      ctx.fillStyle = colors[i % colors.length];
      ctx.fillRect(x, y, barWidth, barH);

      // Label
      ctx.fillStyle = '#e0e0e0';
      ctx.font = '10px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(s.group_name, x + barWidth / 2, h - 5);
      ctx.fillText(val.toFixed(0), x + barWidth / 2, y - 4);
    });

    // Y axis
    ctx.strokeStyle = '#1a2a3a';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
      const y = pad.top + ch * i / 4;
      ctx.beginPath();
      ctx.moveTo(pad.left, y);
      ctx.lineTo(w - pad.right, y);
      ctx.stroke();
      ctx.fillStyle = '#556677';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText((maxVal - maxVal * i / 4).toFixed(0), pad.left - 4, y + 3);
    }
  }

  // Best group highlight
  const tableDiv = document.getElementById('exp-comparison-table');
  let html = '';
  if (data.best_group) {
    html += `<div style="background:#1a3a2a;border:1px solid #4CAF50;border-radius:4px;padding:8px;margin-bottom:6px;">
      <b style="color:#4CAF50;">最佳策略: ${data.best_group}</b>
      <span style="color:#8899aa;margin-left:8px;">${data.best_metric}</span>
    </div>`;
  }

  // Comparison table
  html += '<table style="width:100%;font-size:11px;border-collapse:collapse;">';
  html += '<tr style="border-bottom:1px solid #2a3a4a;"><th style="text-align:left;padding:4px;">组名</th><th>平均口碑</th><th>最低口碑</th><th>热度</th><th>监管</th></tr>';
  summaries.forEach(s => {
    html += `<tr style="border-bottom:1px solid #1a2a3a;">
      <td style="padding:4px;">${s.group_name}</td>
      <td style="text-align:center;">${(s.avg_approval||0).toFixed(0)}</td>
      <td style="text-align:center;">${(s.min_approval||0).toFixed(0)}</td>
      <td style="text-align:center;">${(s.heat_index||0).toFixed(0)}</td>
      <td style="text-align:center;">Lv.${s.regulatory_level||0}</td>
    </tr>`;
  });
  html += '</table>';

  // Per-person delta
  if (data.per_person_delta && Object.keys(data.per_person_delta).length) {
    html += '<div style="margin-top:8px;"><b style="font-size:11px;">口碑变化（vs 对照组）</b>';
    Object.entries(data.per_person_delta).forEach(([group, deltas]) => {
      html += `<div style="margin:4px 0;font-size:11px;"><span style="color:#4FC3F7;">${group}:</span> `;
      Object.entries(deltas).forEach(([person, delta]) => {
        const color = delta > 0 ? '#4CAF50' : delta < 0 ? '#F44336' : '#888';
        html += `<span style="color:${color}">${person}: ${delta > 0 ? '+' : ''}${delta}</span> `;
      });
      html += '</div>';
    });
    html += '</div>';
  }

  // Recommendations
  if (data.recommendations && data.recommendations.length) {
    html += '<div style="margin-top:6px;">';
    data.recommendations.forEach(r => {
      html += `<div style="font-size:11px;color:#aabbcc;margin:2px 0;">- ${r}</div>`;
    });
    html += '</div>';
  }

  tableDiv.innerHTML = html;
}
