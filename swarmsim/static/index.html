// ── Agent Interaction Visualization ──

let _lastInteractionDay = -1;

function showDayInteraction(state) {
  const panel = document.getElementById('crisis-interactions');
  if (!panel) return;

  const day = state.day;
  const actions = state.agent_actions || [];
  const reactions = state.audience_reactions || [];
  const persons = Object.keys(state.approval_scores || {});
  const interventions = state.active_interventions || [];

  document.getElementById('interaction-day-label').textContent =
    `— 第${day}天 ${state.phase_label || ''}`;

  // Remove placeholder on first call
  if (_lastInteractionDay < 0) {
    panel.innerHTML = '';
  }

  // Auto-collapse previous day section
  if (_lastInteractionDay >= 0) {
    const prevSection = document.getElementById('day-section-' + _lastInteractionDay);
    if (prevSection) prevSection.classList.add('collapsed');
  }

  // Skip duplicate days
  const existingSection = document.getElementById('day-section-' + day);
  if (existingSection) {
    existingSection.classList.remove('collapsed');
    _lastInteractionDay = day;
    panel.scrollTop = panel.scrollHeight;
    return;
  }

  // Build summary for header
  const actionSummary = actions.map(a => a.action_label || a.action).join(', ');
  const reactionCount = reactions.length;
  let summaryParts = [];
  if (actions.length) summaryParts.push(`${actions.length}个动作`);
  if (reactionCount) summaryParts.push(`${reactionCount}条评论`);
  const summary = summaryParts.length ? summaryParts.join(' · ') : '无动作';

  let bodyHtml = '';

  // Interventions
  if (interventions.length) {
    interventions.forEach(iv => {
      bodyHtml += `<div class="interaction-card" style="border-left:3px solid #FF7043;">
        <div class="actor" style="color:#FF7043;">🎯 干预: ${iv.description || ''}</div>
      </div>`;
    });
  }

  // Agent actions in order
  actions.forEach((a, idx) => {
    const personIdx = persons.indexOf(a.actor);
    const color = PERSON_COLORS[personIdx >= 0 ? personIdx % PERSON_COLORS.length : idx];
    const isTriggered = !!a.triggered_by;

    bodyHtml += `<div class="interaction-card${isTriggered ? ' triggered' : ''}" style="animation-delay:${idx * 100}ms">`;
    bodyHtml += `<div class="actor" style="color:${color};">
      <span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${color};margin-right:4px;vertical-align:middle;"></span>`;
    bodyHtml += `${a.actor} → <b>${a.action_label || (a.action || '').replace(/_/g, ' ')}</b></div>`;

    if (a.content) {
      bodyHtml += `<div class="action-content">${a.content.substring(0, 100)}</div>`;
    }

    // Effects summary
    if (a.effects && Object.keys(a.effects).length) {
      const ap = a.effects.approval_delta || 0;
      const ht = a.effects.heat_delta || 0;
      const br = a.effects.brand_delta || 0;
      bodyHtml += `<div class="effects-info">`;
      bodyHtml += `口碑${ap >= 0 ? '+' : ''}${ap.toFixed(1)}`;
      bodyHtml += ` · 热度${ht >= 0 ? '+' : ''}${ht.toFixed(1)}`;
      if (br) bodyHtml += ` · 品牌${br >= 0 ? '+' : ''}${br.toFixed(1)}`;
      bodyHtml += `</div>`;
    }

    // Trigger info
    if (isTriggered) {
      const triggerAction = actions.find(b => b.actor === a.triggered_by);
      const triggerLabel = triggerAction ? (triggerAction.action_label || triggerAction.action) : '';
      bodyHtml += `<div class="trigger-info">⚡ 被 ${a.triggered_by} 的 ${triggerLabel} 触发`;
      if (a.trigger_relation) bodyHtml += ` [${a.trigger_relation}]`;
      bodyHtml += `</div>`;
    }

    bodyHtml += `</div>`;
  });

  // Audience reactions
  if (reactions.length) {
    const posCount = reactions.filter(r => r.sentiment === 'positive').length;
    const negCount = reactions.filter(r => r.sentiment === 'negative').length;
    const neuCount = reactions.filter(r => r.sentiment === 'neutral').length;
    bodyHtml += `<div class="interaction-audience-label">🗣️ 观众反应 (${reactions.length}) `;
    bodyHtml += `<span style="color:#66BB6A;">+${posCount}</span> / `;
    bodyHtml += `<span style="color:#F44336;">-${negCount}</span> / `;
    bodyHtml += `<span style="color:#556677;">=${neuCount}</span></div>`;
    reactions.slice(0, 8).forEach((r, idx) => {
      const icon = r.sentiment === 'positive' ? '🟢' : r.sentiment === 'negative' ? '🔴' : '⚪';
      bodyHtml += `<div class="interaction-audience-bubble" style="animation-delay:${(actions.length + idx) * 60}ms">`;
      bodyHtml += `${icon} ${(r.content || '').substring(0, 60)}`;
      bodyHtml += `</div>`;
    });
  }

  if (!bodyHtml) bodyHtml = '<div style="color:#556677;font-size:11px;">本日无动作</div>';

  // Build day section
  const sectionHtml = `
    <div class="day-section" id="day-section-${day}">
      <div class="day-section-header" onclick="toggleDaySection(${day})">
        <span class="toggle-icon">▼</span>
        <span class="day-title">第${day}天 — ${state.phase_label || ''}</span>
        <span class="day-summary">${summary}</span>
      </div>
      <div class="day-section-body">${bodyHtml}</div>
    </div>`;

  panel.insertAdjacentHTML('beforeend', sectionHtml);
  _lastInteractionDay = day;
  panel.scrollTop = panel.scrollHeight;
}

function toggleDaySection(day) {
  const section = document.getElementById('day-section-' + day);
  if (section) section.classList.toggle('collapsed');
}

async function loadCrisisOutcome() {
  const res = await api('/api/crisis/outcome');
  if (res.error) return showToast(res.error, 'error');
  const el = document.getElementById('crisis-outcome');
  let html = `<div class="outcome-box">`;
  html += `<div class="outcome-verdict" style="color:${res.verdict==='better'?'#4CAF50':res.verdict==='worse'?'#F44336':'#FFC107'}">${res.verdict_label}</div>`;
  html += `<p style="font-size:12px;white-space:pre-wrap;margin:8px 0;">${res.summary}</p>`;
  if (res.metrics_comparison) {
    Object.entries(res.metrics_comparison).forEach(([key, val]) => {
      if (key.startsWith('_')) return;
      html += `<div style="margin-bottom:6px;"><b style="color:#4FC3F7;">${key}</b>`;
      if (typeof val === 'object') {
        Object.entries(val).forEach(([k,v]) => {
          if (typeof v === 'number') v = v.toFixed(1);
          html += `<div class="outcome-metric"><span>${k}</span><span>${v}</span></div>`;
        });
      }
      html += `</div>`;
    });
  }
  if (res.pr_recommendations && res.pr_recommendations.length) {
    html += `<h4 style="margin-top:8px;">PR 建议</h4>`;
    res.pr_recommendations.forEach(r => html += `<p style="font-size:11px;color:#aabbcc;margin:2px 0;">- ${r}</p>`);
  }
  html += `</div>`;
  el.innerHTML = html;
}

let _currentIvTab = 'action';

function switchIvTab(tab) {
  _currentIvTab = tab;
  document.getElementById('iv-action-tab').style.display = tab === 'action' ? '' : 'none';
  document.getElementById('iv-event-tab').style.display = tab === 'event' ? '' : 'none';
  document.getElementById('iv-tab-action').classList.toggle('active', tab === 'action');
  document.getElementById('iv-tab-event').classList.toggle('active', tab === 'event');
}

async function addCrisisIntervention() {
  const day = document.getElementById('crisis-iv-day').value;
  const body = { trigger_type: 'time_absolute' };
  if (day) body.day = parseInt(day);

  if (_currentIvTab === 'action') {
    const person = document.getElementById('crisis-iv-person').value;
    const action = document.getElementById('crisis-iv-pr-action').value;
    if (!person) return showToast('请选择人物', 'warning');
    body.person = person;
    body.action = action;
    body.description = `${person} → ${document.getElementById('crisis-iv-pr-action').selectedOptions[0]?.text || action}`;
  } else {
    const eventType = document.getElementById('crisis-iv-event-type').value;
    const eventDesc = document.getElementById('crisis-iv-event-desc').value;
    const eventPerson = document.getElementById('crisis-iv-event-person').value;
    body.event_type = eventType;
    body.external_event = eventDesc || eventType;
    if (eventPerson) body.person = eventPerson;
    body.description = `注入: ${eventDesc || eventType}`;
  }

  const res = await apiPost('/api/crisis/intervene', body);
  if (res.error) return showToast(res.error, 'error');
  document.getElementById('crisis-pending-ivs').innerHTML =
    (res.pending || []).map(d => `<div style="margin:2px 0;">⏳ ${d}</div>`).join('');
  showToast('干预已添加', 'success', 2000);
}

function updateCrisisUI(state) {
  if (!state) return;

  // Phase transition cinematic effect
  checkPhaseTransition(state);

  // Breaking news for new headlines
  const newHeadlines = (state.media_headlines || []).filter(h => h.reach > 0.6);
  if (newHeadlines.length > _lastHeadlineCount && _lastHeadlineCount > 0) {
    const latest = newHeadlines[0];
    if (latest && latest.headline) showBreakingNews(latest.headline);
  }
  _lastHeadlineCount = newHeadlines.length;

  // Day label
  document.getElementById('crisis-day-label').innerHTML =
    `第${state.day}天 <span class="phase-badge phase-${state.phase}">${state.phase_label}</span>`;

  // Person cards
  const personsEl = document.getElementById('crisis-persons');
  personsEl.innerHTML = '';
  const names = Object.keys(state.approval_scores || {});
  names.forEach((name, i) => {
    const ap = state.approval_scores[name] || 50;
    const bv = (state.brand_values || {})[name] || 50;
    const color = PERSON_COLORS[i % PERSON_COLORS.length];
    // Check if this person was triggered by interaction
    const myInteractions = (state.interaction_log || []).filter(l => l.responder === name);
    let interactionHtml = '';
    if (myInteractions.length) {
      const last = myInteractions[myInteractions.length - 1];
      interactionHtml = `<div style="font-size:10px;color:#FFC107;margin-top:2px;">← 被${last.trigger}的${last.trigger_action}触发</div>`;
    }
    personsEl.innerHTML += `
      <div class="crisis-person-card">
        <div style="display:flex;justify-content:space-between;align-items:center;">
          <span class="name" style="color:${color}">${name}</span>
          <span class="score">${ap.toFixed(0)}</span>
        </div>
        <div class="crisis-bar"><div class="crisis-bar-fill" style="width:${ap}%;background:${color}"></div></div>
        <div style="display:flex;justify-content:space-between;margin-top:4px;">
          <span class="label">品牌: ${bv.toFixed(0)}</span>
          <span class="label">监管: Lv.${state.regulatory_level}</span>
        </div>
        ${interactionHtml}
      </div>`;
  });

  // Update all intervention person selects
  const personSelects = [
    'crisis-iv-person', 'crisis-iv-event-person',
  ];
  personSelects.forEach(selId => {
    const sel = document.getElementById(selId);
    if (!sel) return;
    const placeholder = sel.querySelector('option')?.textContent || '人物';
    sel.innerHTML = `<option value="">${placeholder}</option>`;
    names.forEach(n => sel.innerHTML += `<option value="${n}">${n}</option>`);
  });

  // Trending — 增量更新 + 排名变化 + 动画
  const trendingEl = document.getElementById('crisis-trending');
  trendingEl.innerHTML = '';
  const trendingTopics = state.trending_topics || [];
  trendingTopics.forEach((t, i) => {
    const prev = _prevTrendingMap[t.title];
    let changeHtml = '';
    if (prev) {
      const diff = prev.rank - t.rank; // positive = rose
      if (diff > 0) changeHtml = `<span class="rank-change rank-up">↑${diff}</span>`;
      else if (diff < 0) changeHtml = `<span class="rank-change rank-down">↓${-diff}</span>`;
    } else if (_lastHeadlineCount > 0) {
      changeHtml = `<span class="rank-change rank-new">NEW</span>`;
    }
    const isHot = (t.heat || 0) > 100000;
    const isTop3 = t.rank <= 3;
    trendingEl.innerHTML += `<div class="trending-item${isTop3 ? ' top-3' : ''}" style="animation-delay:${i * 40}ms">
      <span><span class="trending-rank">#${t.rank}${changeHtml}</span> ${t.title}</span>
      <span class="trending-heat${isHot ? ' hot' : ''}">${(t.heat/1000).toFixed(1)}k</span>
    </div>`;
  });
  // Build new map for next comparison
  _prevTrendingMap = {};
  trendingTopics.forEach(t => { _prevTrendingMap[t.title] = { rank: t.rank, heat: t.heat }; });

  // Media
  const mediaEl = document.getElementById('crisis-media');
  mediaEl.innerHTML = '';
  (state.media_headlines || []).slice(0, 6).forEach(h => {
    mediaEl.innerHTML += `<div class="media-item">
      <span class="media-outlet">[${h.outlet}]</span> ${h.headline}
    </div>`;
  });

  // Brands
  const brandsEl = document.getElementById('crisis-brands');
  brandsEl.innerHTML = '';
  Object.entries(state.person_brands || {}).forEach(([person, brands]) => {
    brandsEl.innerHTML += `<div style="font-size:12px;color:#4FC3F7;margin-bottom:2px;">${person}</div>`;
    brands.forEach(b => {
      brandsEl.innerHTML += `<div class="brand-item">
        <span>${b.brand}</span>
        <span class="brand-action-${b.action}">${b.action}</span>
      </div>`;
    });
  });

  // Audience reactions
  const audienceEl = document.getElementById('crisis-audience');
  audienceEl.innerHTML = '';
  const reactions = state.audience_reactions || [];
  if (reactions.length) {
    const posCount = reactions.filter(r => r.sentiment === 'positive').length;
    const negCount = reactions.filter(r => r.sentiment === 'negative').length;
    const neuCount = reactions.filter(r => r.sentiment === 'neutral').length;
    audienceEl.innerHTML += `<div style="font-size:11px;margin-bottom:4px;">
      <span class="audience-sentiment-pos">+${posCount}</span> /
      <span class="audience-sentiment-neg">-${negCount}</span> /
      <span class="audience-sentiment-neu">${neuCount}</span>
    </div>`;
    reactions.slice(0, 5).forEach(r => {
      const cls = r.sentiment === 'positive' ? 'audience-sentiment-pos'
        : r.sentiment === 'negative' ? 'audience-sentiment-neg' : 'audience-sentiment-neu';
      audienceEl.innerHTML += `<div class="audience-item">
        <span class="${cls}">${r.sentiment === 'positive' ? '+' : r.sentiment === 'negative' ? '-' : '='}</span>
        ${(r.content || '').substring(0, 40)}
      </div>`;
    });
  } else {
    audienceEl.innerHTML = '<div style="color:#556677;font-size:11px;">等待仿真运行...</div>';
  }

  // Interaction log display in person cards
  const interactions = state.interaction_log || [];

  // Timeline — 从完整历史累积显示
  const tlEl = document.getElementById('crisis-timeline-list');
  tlEl.innerHTML = '';
  crisisHistory.forEach(s => {
    const dayLabel = `<span style="color:#4FC3F7;font-weight:bold;">Day${s.day}</span> `;
    const dayActions = s.agent_actions || [];
    dayActions.forEach(a => {
      let triggerHtml = '';
      if (a.triggered_by) {
        const trigger = dayActions.find(b => b.actor === a.triggered_by);
        const triggerLabel = trigger ? (trigger.action_label || trigger.action) : '动作';
        triggerHtml = ` <span class="interaction-arrow">← ${a.triggered_by}的${triggerLabel}触发</span>`;
      }
      tlEl.innerHTML += `<li>${dayLabel}<b>${a.actor}</b> ${a.action_label} ${a.content ? '- ' + a.content : ''}${triggerHtml}</li>`;
    });
    (s.rumors || []).forEach(r => {
      tlEl.innerHTML += `<li>${dayLabel}<span style="color:#FF7043;">谣言: ${r.content}</span></li>`;
    });
  });

  // Chart
  drawCrisisChart();
}

let _crisisChart = null;

function clearCrisisChart() {
  if (_crisisChart) { _crisisChart.destroy(); _crisisChart = null; }
}

function drawCrisisChart() {
  if (!crisisHistory.length) return;

  const canvas = document.getElementById('crisis-chart');
  const names = Object.keys(crisisHistory[0].approval_scores || {});
  const labels = crisisHistory.map(s => 'D' + s.day);

  const datasets = names.map((name, idx) => ({
    label: name,
    data: crisisHistory.map(s => s.approval_scores[name] || 50),
    borderColor: PERSON_COLORS[idx % PERSON_COLORS.length],
    backgroundColor: PERSON_COLORS[idx % PERSON_COLORS.length] + '18',
    borderWidth: 2,
    pointRadius: 0,
    pointHoverRadius: 5,
    pointHoverBackgroundColor: PERSON_COLORS[idx % PERSON_COLORS.length],
    tension: 0.3,
    fill: false,
  }));

  // Heat line
  datasets.push({
    label: '热度',
    data: crisisHistory.map(s => s.heat_index || 0),
    borderColor: '#FF7043',
    borderWidth: 1,
    borderDash: [4, 4],
    pointRadius: 0,
    tension: 0.3,
    fill: false,
  });

  if (_crisisChart) _crisisChart.destroy();

  _crisisChart = new Chart(canvas, {
    type: 'line',
    data: { labels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 400, easing: 'easeOutQuart' },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          display: true,
          position: 'top',
          labels: { color: '#8899aa', font: { size: 10 }, boxWidth: 12, padding: 8 },
        },
        tooltip: {
          backgroundColor: 'rgba(15,25,35,0.95)',
          borderColor: '#2a3a4a',
          borderWidth: 1,
          titleColor: '#e8edf2',
          bodyColor: '#8899aa',
          padding: 10,
          cornerRadius: 6,
        },
      },
      scales: {
        x: {
          grid: { color: '#1a2a3a' },
          ticks: { color: '#556677', font: { size: 10 }, maxTicksLimit: 8 },
        },
        y: {
          min: 0, max: 100,
          grid: { color: '#1a2a3a' },
          ticks: { color: '#556677', font: { size: 10 }, stepSize: 25 },
        },
      },
    },
  });
}

// ── Custom Scenario Functions ──

let customCelebrities = [];
let selectedCustomPersons = new Set();

function toggleCustomScenario() {
  const panel = document.getElementById('crisis-custom-panel');
  if (panel.style.display === 'none') {
    panel.style.display = 'block';
    loadCelebritiesForCustom();
  } else {
    panel.style.display = 'none';
  }
}

async function loadCelebritiesForCustom() {
  const data = await api('/api/crisis/celebrities');
  customCelebrities = data.celebrities || [];
  const grid = document.getElementById('cc-person-grid');
  grid.innerHTML = '';
  customCelebrities.forEach(c => {
    const fans = c.weibo_followers || 0;
    const fansText = fans >= 1e8 ? (fans/1e8).toFixed(1)+'亿' : fans >= 1e4 ? (fans/1e4).toFixed(0)+'万' : fans;
    const occ = (c.occupation || []).slice(0, 2).join('·');
    const checked = selectedCustomPersons.has(c.name) ? 'checked' : '';
    grid.innerHTML += `
      <div style="display:flex;align-items:center;gap:6px;padding:3px 0;border-bottom:1px solid #1a2a3a;">
        <input type="checkbox" class="cc-person-cb" data-name="${c.name}" ${checked}
          onchange="toggleCustomPerson('${c.name}', this.checked)" style="width:14px;height:14px;">
        <div style="flex:1;">
          <div style="font-size:12px;font-weight:500;">${c.name}</div>
          <div style="font-size:10px;color:#667788;">${occ} · ${fansText}粉丝</div>
        </div>
      </div>`;
  });
}

function toggleCustomPerson(name, checked) {
  if (checked && selectedCustomPersons.size >= 6) {
    showToast('最多选择6人', 'warning');
    // uncheck the last one
    document.querySelectorAll('.cc-person-cb').forEach(cb => {
      if (cb.dataset.name === name) cb.checked = false;
    });
    return;
  }
  if (checked) selectedCustomPersons.add(name);
  else selectedCustomPersons.delete(name);
  document.getElementById('cc-relationships').innerHTML =
    `已选 ${selectedCustomPersons.size} 人: ${[...selectedCustomPersons].join(', ')}`;
}

async function discoverRelationships() {
  if (selectedCustomPersons.size < 2) {
    showToast('请至少选择2人', 'warning'); return;
  }
  const persons = [...selectedCustomPersons].join(',');
  const data = await api(`/api/crisis/relationships?persons=${encodeURIComponent(persons)}`);
  const rels = data.relationships || [];
  const el = document.getElementById('cc-relationships');
  if (!rels.length) {
    el.innerHTML = '<span style="color:#FF7043">未发现已知关系</span>';
    return;
  }
  el.innerHTML = rels.map(r =>
    `<div style="margin:2px 0;"><span style="color:#4FC3F7">${r.person_a}</span>` +
    ` — <span style="color:#FF9800">${r.relation_type}</span> — ` +
    `<span style="color:#4FC3F7">${r.person_b}</span></div>`
  ).join('');
}

async function createCustomScenario() {
  if (selectedCustomPersons.size < 2) {
    showToast('请至少选择2人', 'warning'); return;
  }
  const title = document.getElementById('cc-title').value.trim() || '自定义场景';
  const desc = document.getElementById('cc-desc').value.trim();
  const type = document.getElementById('cc-type').value;
  const severity = parseFloat(document.getElementById('cc-severity').value);

  const res = await apiPost('/api/crisis/custom-scenario', {
    title, description: desc, involved_persons: [...selectedCustomPersons],
    initial_severity: severity, gossip_type: type, interaction_mode: 'crisis',
  });
  if (res.error) return showToast(res.error, 'error');

  crisisHistory = [res.initial_state];
  updateCrisisUI(res.initial_state);
  document.getElementById('crisis-status').textContent = `自定义场景「${title}」已启动`;

  // 刷新场景下拉
  loadCrisisScenarios();
}
